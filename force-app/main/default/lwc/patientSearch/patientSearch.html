<template>

    <lightning-card title="Search Patient">

        <div class="slds-p-around_medium">

            <lightning-input
                type="search"
                label="Search Patient"
                placeholder="Enter Patient Name"
                onchange={handleSearchKey}>
            </lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button
                    label="Search"
                    variant="brand"
                    onclick={handleSearch}>
                </lightning-button>
            </div>

        </div>

        <template if:true={patients}>
            <lightning-datatable
                key-field="Id"
                data={patients}
                columns={columns}>
            </lightning-datatable>
        </template>

    </lightning-card>

</template>
